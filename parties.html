<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Parties - Trinetra System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <div class="tiranga-strip"></div>

    <nav class="top-nav">
        <a href="home.html">Home</a>
        <a href="billing.html">Billing</a>
        <a href="parties.html" class="active">Parties</a>
        <a href="stock.html">Stock</a>
        <a href="accounts.html">Accounts</a>
    </nav>

    <div class="container">
        <div class="card gold-border">
            <h2 class="gold-text">Add New Party</h2>
            <div class="form-grid">
                <input type="text" id="partyName" placeholder="Party Name" class="gold-input">
                <input type="text" id="partyGST" placeholder="GST Number" class="gold-input">
                <input type="text" id="partyState" placeholder="State Code" class="gold-input">
                <select id="partyType" class="gold-input">
                    <option value="customer">Customer</option>
                    <option value="supplier">Supplier</option>
                </select>
                <button onclick="addParty()" class="gold-btn">Save Party</button>
            </div>
        </div>

        <div class="card gold-border">
            <h2 class="gold-text">Party List & Balance</h2>
            <div id="partyList" class="scrollable-list">
                </div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content dark-card gold-border">
            <span class="close gold-text" onclick="closePaymentModal()">&times;</span>
            <h3 class="gold-text">Payment Entry</h3>
            <p>Party: <strong id="modalPartyName"></strong></p>
            <input type="hidden" id="modalPartyId">
            <input type="number" id="paymentAmount" placeholder="Amount" class="gold-input">
            <select id="paymentType" class="gold-input">
                <option value="receive">Received (In)</option>
                <option value="give">Given (Out)</option>
            </select>
            <input type="text" id="paymentNote" placeholder="Note (optional)" class="gold-input">
            <button onclick="submitPayment()" class="gold-btn">Save Entry</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
