<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tiranga-header"></div>

    <nav>
        <a href="index.html" class="active" style="border: 1px solid #FFD700; background: rgba(255, 215, 0, 0.1);">🏠 Home</a>
        <a href="parties.html">👥 Parties</a>
        <a href="items.html">📦 Items</a>
        <a href="accounts.html">💰 Accounts</a>
        <a href="billing.html">📄 Invoice</a>
    </nav>

    <div class="container">
        <header style="text-align: center; margin: 20px 0;">
            <h1 style="color: #FFD700; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);">TRINETRA BILLING</h1>
            <p style="font-size: 0.75rem; color: #FFD700; opacity: 0.8; font-weight: bold;">🇮🇳 MAKE IN INDIA INITIATIVE</p>
        </header>

        <div class="stats">
            <div class="stat-card">
                <p style="font-size: 0.9rem; color: #ccc;">Today's Sale</p>
                <h3 id="todaySale" style="color: #FFD700;">₹ 0.00</h3>
            </div>
            <div class="stat-card">
                <p style="font-size: 0.9rem; color: #ccc;">Pending Dues</p>
                <h3 style="color: #ff4444;" id="pendingDues">₹ 0.00</h3>
            </div>
            <div class="stat-card">
                <p style="font-size: 0.9rem; color: #ccc;">Total Items</p>
                <h3 id="totalItemsCount" style="color: #FFD700;">0</h3>
            </div>
        </div>

        <div class="card" style="margin-top: 20px;">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;">Quick Actions</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <button onclick="window.location.href='billing.html'">+ New Invoice</button>
                <button onclick="window.location.href='items.html'">+ Add Stock</button>
            </div>
        </div>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 5px;">Recent Invoices</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Bill No.</th>
                            <th>Party Name</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="recentInvoices">
                        <tr>
                            <td colspan="4" style="text-align:center; color:#888; padding: 20px;">No recent transactions</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
