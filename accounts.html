<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - Invoice System</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-page="accounts">
    <nav>
        <a href="home.html">🏠 Home</a>
        <a href="parties.html">👥 Parties</a>
        <a href="items.html">📦 Items</a>
        <a href="accounts.html">💰 Accounts</a>
        <a href="invoice.html">🧾 Invoice</a>
    </nav>
    <div class="container">
        <div class="stats">
            <div class="stat-card">Input GST<br><h3 id="inputGST">0</h3></div>
            <div class="stat-card">Output GST<br><h3 id="outputGST">0</h3></div>
            <div class="stat-card">Net GST<br><h3 id="netGST">0</h3></div>
        </div>

        <div class="card">
            <h2>➕ Add GST Transaction</h2>
            <div class="form-row">
                <input type="text" id="transParty" placeholder="Party Name">
                <input type="number" id="transAmount" placeholder="Amount">
                <select id="transType">
                    <option value="Sale">Sale (Output GST)</option>
                    <option value="Purchase">Purchase (Input GST)</option>
                </select>
                <button onclick="addTransaction()">Add</button>
            </div>
        </div>

        <div class="card">
            <h2>➕ Add Expense</h2>
            <div class="form-row">
                <input type="text" id="expenseName" placeholder="Expense Name">
                <input type="number" id="expenseAmount" placeholder="Amount">
                <select id="expenseCategory">
                    <option value="Rent">Rent</option>
                    <option value="Salary">Salary</option>
                    <option value="Electricity">Electricity</option>
                    <option value="Transport">Transport</option>
                    <option value="Other">Other</option>
                </select>
                <button onclick="addExpenseFromAccounts()">Add Expense</button>
            </div>
        </div>

        <div class="card">
            <div id="paymentHistory"></div>
        </div>

        <div class="card">
            <div id="expenseList"></div>
        </div>

        <div class="card">
            <div id="transactionList"></div>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
