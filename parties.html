<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra - Party Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body data-page="parties">
    <div class="tiranga-header"></div>

    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="parties.html" style="border: 1px solid #FFD700; background: rgba(255, 215, 0, 0.2);">👥 Parties</a>
        <a href="items.html">📦 Items</a>
        <a href="accounts.html">💰 Accounts</a>
        <a href="billing.html">📄 Invoice</a>
    </nav>

    <div class="container">
        <header style="text-align: center; margin: 20px 0;">
            <h1 style="color: #FFD700; letter-spacing: 1px;">PARTY MANAGEMENT</h1>
        </header>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px;">➕ Add New Party</h2>
            <input type="text" id="partyName" placeholder="Party Name (नाम)">
            <input type="text" id="partyGST" placeholder="GST Number (Optional)">
            <input type="number" id="openingBalance" placeholder="Opening Balance (₹)">
            <button onclick="addParty()">SAVE PARTY</button>
        </div>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px;">👥 Registered Parties</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Party Name</th>
                            <th>GST No.</th>
                            <th>Balance</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="partyList">
                        <tr>
                            <td colspan="4" style="text-align:center; color:#555; padding: 20px;">No parties found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
