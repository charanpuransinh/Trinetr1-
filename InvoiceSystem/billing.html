<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trinetra Billing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <div class="tiranga-strip"></div>
    <header class="bill-header">
        <div class="my-company">
            <h2 class="gold-text">MOGAL Industries</h2>
            <p>Modasa, Gujarat</p>
        </div>
        <div class="invoice-meta">
            <input type="text" placeholder="Inv No: INVOICE12" class="gold-input-sm">
            <input type="date" class="gold-input-sm">
        </div>
    </header>

    <hr class="gold-line">

    <section class="party-section">
        <div class="bill-to">
            <label>BILL TO:</label>
            <input type="text" placeholder="Party Name" class="gold-input">
            <input type="number" placeholder="Mobile No" class="gold-input">
        </div>
    </section>

    <section class="item-table-container">
        <table class="billing-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>HSN</th>
                    <th>Qty</th>
                    <th>Rate</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="item-list">
                <tr>
                    <td><input type="text" placeholder="Item Name"></td>
                    <td><input type="text" placeholder="HSN"></td>
                    <td><input type="number" placeholder="0"></td>
                    <td><input type="number" placeholder="0.00"></td>
                    <td class="gold-text">0.00</td>
                </tr>
            </tbody>
        </table>
        <button class="add-btn">+ Add Item</button>
    </section>

    <footer class="bill-footer">
        <div class="tax-details">
            <p>SGST (9%): <span id="sgst">0.00</span></p>
            <p>CGST (9%): <span id="cgst">0.00</span></p>
            <h3 class="gold-text">Grand Total: ₹ <span id="grand-total">0.00</span></h3>
        </div>
        <div class="action-buttons">
            <button class="save-btn">SAVE BILL</button>
            <button class="print-btn">PRINT</button>
        </div>
    </footer>

</body>
</html>
