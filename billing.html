<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinetra - Create Invoice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tiranga-header"></div>
    
    <nav>
        <a href="index.html">🏠 Home</a>
        <a href="parties.html">👥 Parties</a>
        <a href="items.html">📦 Items</a>
        <a href="billing.html" style="border: 1px solid #FFD700; background: rgba(255, 215, 0, 0.1);">📄 Invoice</a>
    </nav>

    <div class="container">
        <header style="text-align: center; margin: 15px 0;">
            <h1 style="color: #FFD700; font-size: 1.5rem;">NEW INVOICE</h1>
        </header>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px;">Customer Details</h2>
            <select id="partySelect">
                <option value="">Select Party (ग्राहक चुनें)</option>
            </select>
            <input type="date" id="billDate">
        </div>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 15px;">Item Details</h2>
            <select id="itemSelect">
                <option value="">Select Item (सामान चुनें)</option>
            </select>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="quantity" placeholder="Qty">
                <input type="number" id="rate" placeholder="Rate">
            </div>
            <button onclick="addItem()" style="margin-top: 10px;">+ Add to Bill</button>
        </div>

        <div class="card">
            <h2 style="color: #FFD700; font-size: 1.1rem; margin-bottom: 10px;">Bill Summary</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="billItems">
                        </tbody>
                </table>
            </div>
            
            <div style="margin-top: 20px; text-align: right;">
                <h3 style="color: #FFD700;">Grand Total: ₹ <span id="grandTotal">0.00</span></h3>
                <button style="margin-top: 15px; background: #27ae60; color: white;">SAVE & PRINT BILL</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
