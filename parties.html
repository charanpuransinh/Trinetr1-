<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parties - Invoice System</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border-radius: 10px;
        }
        .close {
            float: right;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body data-page="parties">
    <nav>
        <a href="home.html">🏠 Home</a>
        <a href="parties.html">👥 Parties</a>
        <a href="items.html">📦 Items</a>
        <a href="accounts.html">💰 Accounts</a>
        <a href="invoice.html">🧾 Invoice</a>
    </nav>
    <div class="container">
        <div class="card">
            <h2>➕ Add New Party</h2>
            <div class="form-row">
                <input type="text" id="partyName" placeholder="Party Name">
                <input type="text" id="partyGST" placeholder="GST Number">
                <input type="text" id="partyStateCode" placeholder="State Code (e.g., 27)">
                <select id="partyType">
                    <option value="customer">Customer</option>
                    <option value="supplier">Supplier</option>
                </select>
                <button onclick="addParty()">Add Party</button>
            </div>
        </div>
        <div class="card">
            <h2>📋 Party List with Balance</h2>
            <div id="partyList"></div>
        </div>
    </div>

    <!-- Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closePaymentModal()">&times;</span>
            <h3>Payment Entry</h3>
            <p>Party: <strong id="modalPartyName"></strong></p>
            <input type="hidden" id="modalPartyId">
            <input type="number" id="paymentAmount" placeholder="Amount" style="width:100%; margin:10px 0">
            <select id="paymentType" style="width:100%; margin:10px 0">
                <option value="receive">Received (Party ne diya)</option>
                <option value="give">Given (Party ko diya)</option>
            </select>
            <input type="text" id="paymentNote" placeholder="Note (optional)" style="width:100%; margin:10px 0">
            <button onclick="submitPayment()">Save Payment</button>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
